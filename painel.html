<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL MIA💓</title>
    <style>
        body { background: #0b141a; color: #fff; font-family: sans-serif; margin: 0; }
        #login { background: #000; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        input { padding: 10px; background: #222; border: 1px solid #ff0055; color: #fff; margin: 5px; }
        header { background: #202c33; padding: 20px; border-bottom: 3px solid #ff0055; text-align: center; }
        #lista { padding: 15px; }
        .log { background: #202c33; margin-bottom: 10px; padding: 15px; border-radius: 8px; border-left: 5px solid #00ffcc; position: relative; }
        .nick { color: #ff0055; font-weight: bold; font-size: 18px; }
        .stats { font-size: 12px; color: #00ffcc; margin-top: 5px; }
        .badge { background: #ff0055; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 10px; float: right; }
    </style>
</head>
<body>

<div id="login">
    <h2 style="color:#ff0055">MIA💓 PRIVATE</h2>
    <input type="password" id="key" placeholder="KEY...">
    <button onclick="entrar()" style="background:#ff0055; color:#fff; border:none; padding:10px 30px; cursor:pointer;">ACESSAR</button>
</div>

<header>
    <div>SISTEMA DE MONITORAMENTO MIA💓</div>
    <input type="text" id="busca" placeholder="Pesquisar Nick..." onkeyup="filtrar()" style="width:80%; margin-top:10px;">
</header>

<div id="lista"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://operacaoantpnr-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.entrar = () => {
        if(document.getElementById('key').value === "ip67") {
            document.getElementById('login').style.display = 'none';
            onValue(ref(db, 'logs_arena/'), (snapshot) => {
                const lista = document.getElementById('lista');
                lista.innerHTML = "";
                snapshot.forEach((child) => {
                    const v = child.val();
                    const item = document.createElement('div');
                    item.className = 'log';
                    item.innerHTML = `
                        <span class="badge">LOGS: ${v.acessos || 1}</span>
                        <span class="nick">${v.player}</span>
                        <div class="stats">
                            🌐 IP: ${v.ip} <br>
                            📍 LOCAL: ${v.local || 'Não encontrado'} <br>
                            👤 CHAR: ${v.personagem || 'Padrão'} <br>
                            🕒 ÚLTIMO ACESSO: ${v.last_seen}
                        </div>
                    `;
                    lista.prepend(item);
                });
            });
        } else { alert("KEY ERRADA!"); }
    }
</script>
</body>
</html>
